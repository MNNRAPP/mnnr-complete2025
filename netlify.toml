## ---------------------------------------------------------------------------
## netlify.toml — Production build configuration for mnnr.app on Netlify
##
## Why this file exists:
## - Repo carries BOTH package-lock.json AND pnpm-lock.yaml. Netlify's
##   auto-detect picks npm first, which fails on packages whose engines.node
##   requires >=20.19 (e.g. @exodus/bytes@1.9.0) and on the pnpm-style
##   scripts in package.json.
## - We pin the package manager to pnpm and Node to 22 to satisfy all
##   transitive engines.node constraints.
## - Build command runs Prisma codegen before next build so @prisma/client
##   resolves correctly at runtime.
## ---------------------------------------------------------------------------

[build]
  command = "pnpm install --no-frozen-lockfile && pnpm db:generate && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22.12.0"
  NETLIFY_USE_PNPM = "true"
  PNPM_FLAGS = "--no-frozen-lockfile"
  NEXT_USE_NETLIFY_EDGE = "true"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"
