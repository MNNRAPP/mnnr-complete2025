## netlify.toml for mnnr.app on Netlify
## - Force pnpm via corepack non-strict + pnpm install
## - Pin Node 22.12.0 to satisfy @exodus/bytes engines.node
## - Run prisma codegen before next build

[build]
command = "corepack pnpm install --no-frozen-lockfile && corepack pnpm db:generate && corepack pnpm build"
publish = ".next"

[build.environment]
NODE_VERSION = "22.12.0"
COREPACK_ENABLE_STRICT = "0"
NPM_FLAGS = "--legacy-peer-deps"
PNPM_FLAGS = "--no-frozen-lockfile"
NEXT_USE_NETLIFY_EDGE = "true"
NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
package = "@netlify/plugin-nextjs"
