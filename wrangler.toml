name = "mnnr-complete2025"
compatibility_date = "2026-03-30"
pages_build_output_dir = ".next"

[vars]
NEXT_PUBLIC_APP_ENV = "production"
NEXT_PUBLIC_REGION = "eu-west"

# EU-first deployment — Frankfurt (fra) primary, Paris (cdg) secondary
# Cloudflare Pages automatically serves from the nearest EU PoP
# but we pin the D1/KV bindings to EU regions

[[routes]]
pattern = "mnnr.app/*"
zone_name = "mnnr.app"

[build]
command = "pnpm build"
