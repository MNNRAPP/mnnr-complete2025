# Dependabot configuration
# Auto-bumps npm packages weekly + GitHub Actions monthly.
# Groups related packages together to reduce PR noise.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      sentry:
        patterns:
          - '@sentry/*'
      clerk:
        patterns:
          - '@clerk/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      next:
        patterns:
          - 'next'
          - 'next-*'
          - 'eslint-config-next'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'
          - 'jest'
          - '@types/jest'
          - '@playwright/test'
      types:
        patterns:
          - '@types/*'
      supabase:
        patterns:
          - '@supabase/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: chore(ci)
